<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>my notes ✦</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #fdf6ee;
  --cream: #fef9f3;
  --border: #e8d9c5;
  --text: #3a2e24;
  --text-soft: #9a8878;
  --rose: #e8b4b8;
  --rose-light: #fdf0f1;
  --sage: #a8c4a2;
  --sage-light: #f0f5ef;
  --butter: #f2d97e;
  --butter-light: #fdf8e8;
  --lavender: #c4b4d8;
  --lavender-light: #f5f0fb;
  --sky: #a8c8e8;
  --sky-light: #f0f6fc;
  --peach: #f0c4a0;
  --peach-light: #fdf4ec;
}
body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  background-image:
    radial-gradient(circle at 15% 20%, rgba(232,180,184,0.18) 0%, transparent 50%),
    radial-gradient(circle at 85% 75%, rgba(168,196,162,0.15) 0%, transparent 50%);
  min-height: 100vh;
  padding: 24px 16px 80px;
  color: var(--text);
}
body::before {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image: radial-gradient(circle, rgba(58,46,36,0.07) 1px, transparent 1px);
  background-size: 24px 24px;
}
.wrapper { max-width: 960px; margin: 0 auto; position: relative; z-index: 1; }

/* ── NAV TABS ── */
.top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
.brand { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 26px; color: var(--text); }
.brand span { color: var(--rose); }
.nav-tabs { display: flex; gap: 6px; background: var(--cream); border: 1.5px solid var(--border); border-radius: 30px; padding: 5px; }
.nav-tab { padding: 7px 18px; border-radius: 24px; font-size: 13px; font-weight: 700; border: none; background: transparent; color: var(--text-soft); cursor: pointer; transition: all 0.2s; font-family: 'Nunito', sans-serif; }
.nav-tab.active { background: var(--text); color: #fff; box-shadow: 0 2px 8px rgba(58,46,36,0.2); }

/* ── PAGES ── */
.page { display: none; }
.page.active { display: block; animation: fadeUp 0.25s ease; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* ════════════════════════════════
   NOTES PAGE
════════════════════════════════ */
.notes-toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
.color-bar { display: flex; gap: 6px; align-items: center; background: var(--cream); border: 1.5px solid var(--border); border-radius: 30px; padding: 6px 12px; }
.color-dot { width: 18px; height: 18px; border-radius: 50%; cursor: pointer; transition: transform 0.15s; border: 2px solid transparent; }
.color-dot:hover { transform: scale(1.2); }
.color-dot.selected { border-color: var(--text); transform: scale(1.1); }
.btn-add { display: flex; align-items: center; gap: 6px; background: var(--text); color: #fff; border: none; border-radius: 30px; padding: 9px 18px; font-size: 13px; font-weight: 700; font-family: 'Nunito', sans-serif; cursor: pointer; transition: all 0.2s; box-shadow: 0 3px 12px rgba(58,46,36,0.2); }
.btn-add:hover { transform: translateY(-1px); box-shadow: 0 5px 16px rgba(58,46,36,0.25); }

.notes-grid { columns: 3 240px; column-gap: 14px; }
.note-card { break-inside: avoid; border-radius: 16px; padding: 18px; margin-bottom: 14px; border: 1.5px solid rgba(0,0,0,0.07); position: relative; transition: box-shadow 0.2s, transform 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.06); animation: noteIn 0.3s cubic-bezier(.34,1.56,.64,1); }
@keyframes noteIn { from { opacity: 0; transform: scale(0.92) translateY(8px); } to { opacity: 1; transform: scale(1) translateY(0); } }
.note-card:hover { box-shadow: 0 8px 24px rgba(0,0,0,0.1); transform: translateY(-2px); }
.note-card.c-rose { background: var(--rose-light); }
.note-card.c-sage { background: var(--sage-light); }
.note-card.c-butter { background: var(--butter-light); }
.note-card.c-lavender { background: var(--lavender-light); }
.note-card.c-sky { background: var(--sky-light); }
.note-card.c-peach { background: var(--peach-light); }
.note-card.c-cream { background: var(--cream); }
.note-stripe { position: absolute; top: 0; left: 0; right: 0; height: 4px; border-radius: 14px 14px 0 0; }
.c-rose .note-stripe { background: var(--rose); }
.c-sage .note-stripe { background: var(--sage); }
.c-butter .note-stripe { background: var(--butter); }
.c-lavender .note-stripe { background: var(--lavender); }
.c-sky .note-stripe { background: var(--sky); }
.c-peach .note-stripe { background: var(--peach); }
.c-cream .note-stripe { background: var(--border); }
.note-topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; margin-top: 4px; }
.note-title { font-family: 'Instrument Serif', serif; font-size: 16px; color: var(--text); outline: none; border: none; background: transparent; width: 100%; cursor: text; line-height: 1.3; }
.note-title:empty::before { content: attr(data-ph); color: var(--text-soft); font-style: italic; }
.note-actions { display: flex; gap: 4px; flex-shrink: 0; opacity: 0; transition: opacity 0.2s; }
.note-card:hover .note-actions { opacity: 1; }
.icon-btn { width: 26px; height: 26px; border-radius: 8px; border: none; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 13px; transition: background 0.15s; color: var(--text-soft); }
.icon-btn:hover { background: rgba(58,46,36,0.1); color: var(--text); }
.icon-btn.del:hover { background: rgba(220,60,60,0.12); color: #c0392b; }
.note-divider { height: 1px; background: rgba(58,46,36,0.1); margin: 8px 0 10px; }
.note-body { font-size: 13.5px; line-height: 1.7; color: var(--text); outline: none; min-height: 60px; cursor: text; white-space: pre-wrap; word-break: break-word; }
.note-body:empty::before { content: attr(data-ph); color: var(--text-soft); }
.note-footer { margin-top: 12px; display: flex; align-items: center; justify-content: space-between; }
.note-date { font-size: 11px; color: var(--text-soft); }
.note-tag { font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-soft); background: rgba(58,46,36,0.07); border-radius: 20px; padding: 2px 8px; outline: none; border: none; cursor: text; font-family: 'Nunito', sans-serif; max-width: 80px; }
.note-tag:empty::before { content: 'tag'; color: var(--text-soft); opacity: 0.5; }
.color-picker-popup { position: absolute; top: 36px; right: 0; background: var(--cream); border: 1.5px solid var(--border); border-radius: 12px; padding: 10px; display: flex; gap: 6px; flex-wrap: wrap; box-shadow: 0 8px 24px rgba(0,0,0,0.12); z-index: 10; width: 130px; animation: fadeIn 0.15s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
.color-swatch { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform 0.15s; }
.color-swatch:hover { transform: scale(1.2); border-color: var(--text); }
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-soft); }
.empty-state .emoji { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 18px; }
.empty-state small { font-size: 13px; margin-top: 6px; display: block; }

/* ════════════════════════════════
   CALENDAR PAGE
════════════════════════════════ */
.cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
.cal-nav { display: flex; align-items: center; gap: 10px; }
.cal-month-title { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 22px; color: var(--text); min-width: 180px; text-align: center; }
.cal-nav-btn { width: 34px; height: 34px; border-radius: 50%; border: 1.5px solid var(--border); background: var(--cream); color: var(--text); cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.cal-nav-btn:hover { background: var(--text); color: #fff; border-color: var(--text); }

.cal-legend { display: flex; gap: 16px; align-items: center; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-soft); }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; }

.cal-grid-wrap { background: var(--cream); border: 1.5px solid var(--border); border-radius: 16px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
.cal-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); background: var(--text); }
.cal-wd { padding: 10px 0; text-align: center; font-size: 11px; font-weight: 800; color: rgba(255,255,255,0.7); letter-spacing: 0.08em; text-transform: uppercase; }
.cal-wd:first-child { color: rgba(232,180,184,0.9); }
.cal-wd:last-child { color: rgba(168,196,162,0.9); }

.cal-days { display: grid; grid-template-columns: repeat(7, 1fr); }
.cal-day {
  min-height: 86px; padding: 8px 6px 6px;
  border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
  cursor: pointer; position: relative; transition: background 0.15s;
  display: flex; flex-direction: column;
}
.cal-day:hover { background: rgba(232,180,184,0.12); }
.cal-day:nth-child(7n) { border-right: none; }
.cal-day.other-month { opacity: 0.35; pointer-events: none; }
.cal-day.today { background: var(--rose-light); }
.cal-day.today .day-num { background: var(--rose); color: var(--text); }
.cal-day.sunday .day-num { color: #d64040; }
.cal-day.saturday .day-num { color: #3a7a3a; }
.cal-day.has-note::after { content: ''; position: absolute; bottom: 5px; right: 6px; width: 6px; height: 6px; border-radius: 50%; background: var(--text-soft); }
.cal-day.has-event::after { background: var(--rose); }

.day-num { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: var(--text); margin-bottom: 4px; flex-shrink: 0; }
.day-events { display: flex; flex-direction: column; gap: 2px; overflow: hidden; flex: 1; }
.day-event-chip { font-size: 10px; line-height: 1.3; color: var(--text); border-radius: 4px; padding: 1px 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 600; }
.day-event-chip.c-rose     { background: rgba(232,180,184,0.5); }
.day-event-chip.c-sage     { background: rgba(168,196,162,0.5); }
.day-event-chip.c-butter   { background: rgba(242,217,126,0.5); }
.day-event-chip.c-lavender { background: rgba(196,180,216,0.5); }
.day-event-chip.c-sky      { background: rgba(168,200,232,0.5); }
.day-event-chip.c-peach    { background: rgba(240,196,160,0.5); }
.day-event-chip.c-cream    { background: rgba(232,217,197,0.5); }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(58,46,36,0.35); backdrop-filter: blur(3px);
  z-index: 100; display: flex; align-items: center; justify-content: center; padding: 16px;
  animation: fadeIn 0.15s ease;
}
.modal {
  background: var(--cream); border-radius: 20px; width: 100%; max-width: 440px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  animation: slideUp 0.25s cubic-bezier(.34,1.4,.64,1);
  overflow: hidden;
}
@keyframes slideUp { from { opacity: 0; transform: translateY(20px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
.modal-header { background: var(--text); color: #fff; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; }
.modal-title { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 17px; }
.modal-close { background: rgba(255,255,255,0.15); border: none; color: #fff; width: 28px; height: 28px; border-radius: 8px; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.modal-close:hover { background: rgba(255,255,255,0.3); }
.modal-body { padding: 20px; }
.modal-label { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-soft); margin-bottom: 6px; display: block; }
.modal-input { width: 100%; border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 12px; font-size: 14px; font-family: 'Nunito', sans-serif; color: var(--text); background: var(--bg); outline: none; transition: border-color 0.15s; margin-bottom: 14px; }
.modal-input:focus { border-color: var(--rose); }
.modal-textarea { resize: vertical; min-height: 100px; }
.modal-colors { display: flex; gap: 8px; margin-bottom: 16px; }
.modal-color-dot { width: 26px; height: 26px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: transform 0.15s; }
.modal-color-dot:hover { transform: scale(1.15); }
.modal-color-dot.selected { border-color: var(--text); }
.modal-footer { display: flex; gap: 8px; justify-content: flex-end; }
.btn-cancel { padding: 9px 18px; border-radius: 30px; border: 1.5px solid var(--border); background: transparent; color: var(--text-soft); font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'Nunito', sans-serif; }
.btn-save { padding: 9px 20px; border-radius: 30px; border: none; background: var(--text); color: #fff; font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'Nunito', sans-serif; box-shadow: 0 3px 10px rgba(58,46,36,0.2); }
.btn-delete-event { padding: 9px 16px; border-radius: 30px; border: none; background: rgba(220,60,60,0.1); color: #c0392b; font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'Nunito', sans-serif; margin-right: auto; }

@media (max-width: 500px) {
  .notes-grid { columns: 1; }
  .cal-day { min-height: 60px; }
  .brand { font-size: 20px; }
}
</style>
</head>
<body>
<div class="wrapper">

  <div class="top-bar">
    <div class="brand">my notes <span>✦</span></div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="switchPage('notes')">📝 Notes</button>
      <button class="nav-tab" onclick="switchPage('calendar')">🗓 Kalender</button>
    </div>
  </div>

  <!-- ══ NOTES PAGE ══ -->
  <div class="page active" id="page-notes">
    <div class="notes-toolbar">
      <div class="color-bar" id="colorBar">
        <div class="color-dot selected" data-color="c-rose"     style="background:#f2c4c8;"></div>
        <div class="color-dot"          data-color="c-sage"     style="background:#a8c4a2;"></div>
        <div class="color-dot"          data-color="c-butter"   style="background:#f2d97e;"></div>
        <div class="color-dot"          data-color="c-lavender" style="background:#c4b4d8;"></div>
        <div class="color-dot"          data-color="c-sky"      style="background:#a8c8e8;"></div>
        <div class="color-dot"          data-color="c-peach"    style="background:#f0c4a0;"></div>
        <div class="color-dot"          data-color="c-cream"    style="background:#e8d9c5;"></div>
      </div>
      <button class="btn-add" onclick="addNote()">＋ note baru</button>
    </div>
    <div class="notes-grid" id="notesGrid"></div>
    <div class="empty-state" id="emptyState">
      <div class="emoji">🌸</div>
      <p>belum ada notes nih</p>
      <small>klik "+ note baru" untuk mulai</small>
    </div>
  </div>

  <!-- ══ CALENDAR PAGE ══ -->
  <div class="page" id="page-calendar">
    <div class="cal-header">
      <div class="cal-nav">
        <button class="cal-nav-btn" onclick="changeMonth(-1)">‹</button>
        <div class="cal-month-title" id="calMonthTitle">—</div>
        <button class="cal-nav-btn" onclick="changeMonth(1)">›</button>
      </div>
      <div class="cal-legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--rose)"></div> ada event</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--text-soft)"></div> ada catatan</div>
      </div>
    </div>
    <div class="cal-grid-wrap">
      <div class="cal-weekdays">
        <div class="cal-wd">Min</div><div class="cal-wd">Sen</div><div class="cal-wd">Sel</div>
        <div class="cal-wd">Rab</div><div class="cal-wd">Kam</div><div class="cal-wd">Jum</div>
        <div class="cal-wd">Sab</div>
      </div>
      <div class="cal-days" id="calDays"></div>
    </div>
  </div>

</div>

<!-- ══ MODAL ══ -->
<div class="modal-overlay" id="modalOverlay" style="display:none;" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Tambah catatan</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <label class="modal-label">judul / event</label>
      <input class="modal-input" id="modalEventName" placeholder="mis. Meeting, Deadline, Liburan...">
      <label class="modal-label">catatan</label>
      <textarea class="modal-input modal-textarea" id="modalNote" placeholder="tulis apa saja..."></textarea>
      <label class="modal-label">warna</label>
      <div class="modal-colors" id="modalColors"></div>
      <div class="modal-footer">
        <button class="btn-delete-event" id="btnDeleteEvent" onclick="deleteEvent()" style="display:none;">🗑 hapus</button>
        <button class="btn-cancel" onclick="closeModal()">batal</button>
        <button class="btn-save" onclick="saveEvent()">simpan ✦</button>
      </div>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════
// SHARED
// ════════════════════════════════
const COLORS = ['c-rose','c-sage','c-butter','c-lavender','c-sky','c-peach','c-cream'];
const COLOR_HEX = { 'c-rose':'#f2c4c8','c-sage':'#a8c4a2','c-butter':'#f2d97e','c-lavender':'#c4b4d8','c-sky':'#a8c8e8','c-peach':'#f0c4a0','c-cream':'#e8d9c5' };
const BULAN_ID = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtDate(ts) { const d=new Date(ts); return d.toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'}); }
function dateKey(y,m,d) { return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }

function switchPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  event.currentTarget.classList.add('active');
  if (name === 'calendar') renderCalendar();
}

// ════════════════════════════════
// NOTES
// ════════════════════════════════
let selectedColor = 'c-rose';
let notes = JSON.parse(localStorage.getItem('aes-notes') || '[]');

function saveNotes() { localStorage.setItem('aes-notes', JSON.stringify(notes)); }

document.querySelectorAll('.color-dot').forEach(dot => {
  dot.addEventListener('click', () => {
    document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
    dot.classList.add('selected');
    selectedColor = dot.dataset.color;
  });
});

function addNote() {
  notes.unshift({ id: Date.now(), color: selectedColor, title: '', body: '', tag: '', ts: Date.now() });
  saveNotes(); renderNotes();
  setTimeout(() => { const f = document.querySelector('.note-title'); if(f) f.focus(); }, 50);
}

function deleteNote(id) { notes = notes.filter(n => n.id !== id); saveNotes(); renderNotes(); }

function changeNoteColor(id, color) { const n = notes.find(x => x.id===id); if(n){n.color=color;saveNotes();} }

function renderNotes() {
  const grid = document.getElementById('notesGrid');
  const empty = document.getElementById('emptyState');
  empty.style.display = notes.length === 0 ? 'block' : 'none';
  grid.innerHTML = '';
  notes.forEach(note => {
    const card = document.createElement('div');
    card.className = `note-card ${note.color}`;
    card.dataset.id = note.id;
    card.innerHTML = `
      <div class="note-stripe"></div>
      <div class="note-topbar">
        <div class="note-title" contenteditable="true" spellcheck="false" data-ph="judul note...">${esc(note.title)}</div>
        <div class="note-actions">
          <div style="position:relative;">
            <button class="icon-btn" onclick="toggleColorPicker(${note.id},this)" title="ganti warna">🎨</button>
          </div>
          <button class="icon-btn del" onclick="deleteNote(${note.id})">🗑</button>
        </div>
      </div>
      <div class="note-divider"></div>
      <div class="note-body" contenteditable="true" spellcheck="false" data-ph="tulis apa aja...">${esc(note.body)}</div>
      <div class="note-footer">
        <span class="note-date">${fmtDate(note.ts)}</span>
        <div class="note-tag" contenteditable="true" spellcheck="false">${esc(note.tag)}</div>
      </div>`;
    card.querySelector('.note-title').addEventListener('input', e => { const n=notes.find(x=>x.id===note.id); if(n){n.title=e.target.innerText;saveNotes();} });
    card.querySelector('.note-body').addEventListener('input', e => { const n=notes.find(x=>x.id===note.id); if(n){n.body=e.target.innerText;saveNotes();} });
    card.querySelector('.note-tag').addEventListener('input', e => { const n=notes.find(x=>x.id===note.id); if(n){n.tag=e.target.innerText;saveNotes();} });
    grid.appendChild(card);
  });
}

function toggleColorPicker(id, btn) {
  document.querySelectorAll('.color-picker-popup').forEach(p => p.remove());
  const popup = document.createElement('div');
  popup.className = 'color-picker-popup';
  COLORS.forEach(c => {
    const sw = document.createElement('div');
    sw.className = 'color-swatch'; sw.style.background = COLOR_HEX[c];
    sw.onclick = () => {
      changeNoteColor(id, c);
      const card = document.querySelector(`.note-card[data-id="${id}"]`);
      if(card){ COLORS.forEach(x=>card.classList.remove(x)); card.classList.add(c); }
      popup.remove();
    };
    popup.appendChild(sw);
  });
  btn.parentElement.appendChild(popup);
  setTimeout(() => {
    document.addEventListener('click', function h(e){ if(!popup.contains(e.target)&&e.target!==btn){popup.remove();document.removeEventListener('click',h);} });
  }, 10);
}

// ════════════════════════════════
// CALENDAR
// ════════════════════════════════
let calYear = 2026;
let calMonth = 0; // 0 = Jan
let events = JSON.parse(localStorage.getItem('aes-events') || '{}');
let modalDate = null;
let modalColor = 'c-rose';

function saveEvents() { localStorage.setItem('aes-events', JSON.stringify(events)); }

function changeMonth(dir) {
  calMonth += dir;
  if(calMonth > 11){ calMonth=0; calYear++; }
  if(calMonth < 0){ calMonth=11; calYear--; }
  renderCalendar();
}

function renderCalendar() {
  document.getElementById('calMonthTitle').textContent = BULAN_ID[calMonth] + ' ' + calYear;
  const daysEl = document.getElementById('calDays');
  daysEl.innerHTML = '';

  const firstDay = new Date(calYear, calMonth, 1).getDay(); // 0=Sun
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const daysInPrev = new Date(calYear, calMonth, 0).getDate();
  const today = new Date();

  // prev month filler
  for(let i = firstDay-1; i >= 0; i--) {
    const d = document.createElement('div');
    d.className = 'cal-day other-month';
    d.innerHTML = `<div class="day-num">${daysInPrev - i}</div>`;
    daysEl.appendChild(d);
  }

  // current month
  for(let day = 1; day <= daysInMonth; day++) {
    const dow = new Date(calYear, calMonth, day).getDay();
    const key = dateKey(calYear, calMonth, day);
    const evList = events[key] || [];
    const isToday = today.getFullYear()===calYear && today.getMonth()===calMonth && today.getDate()===day;

    const d = document.createElement('div');
    let cls = 'cal-day';
    if(isToday) cls += ' today';
    if(dow===0) cls += ' sunday';
    if(dow===6) cls += ' saturday';
    const hasNote = evList.some(e => e.note && e.note.trim());
    const hasEvent = evList.some(e => e.name && e.name.trim());
    if(hasEvent) cls += ' has-event';
    else if(hasNote) cls += ' has-note';
    d.className = cls;

    const chips = evList.slice(0,2).map(e =>
      `<div class="day-event-chip ${e.color||'c-rose'}">${esc(e.name||'catatan')}</div>`
    ).join('');
    const more = evList.length > 2 ? `<div style="font-size:10px;color:var(--text-soft);padding-left:4px;">+${evList.length-2} lagi</div>` : '';

    d.innerHTML = `<div class="day-num">${day}</div><div class="day-events">${chips}${more}</div>`;
    d.addEventListener('click', () => openModal(key, day));
    daysEl.appendChild(d);
  }

  // next month filler
  const total = firstDay + daysInMonth;
  const remaining = total % 7 === 0 ? 0 : 7 - (total % 7);
  for(let i = 1; i <= remaining; i++) {
    const d = document.createElement('div');
    d.className = 'cal-day other-month';
    d.innerHTML = `<div class="day-num">${i}</div>`;
    daysEl.appendChild(d);
  }
}

// ── MODAL ──
let editingEventIdx = null;

function openModal(key, day) {
  modalDate = key;
  editingEventIdx = null;
  modalColor = 'c-rose';

  const label = `${day} ${BULAN_ID[calMonth]} ${calYear}`;
  document.getElementById('modalTitle').textContent = label;
  document.getElementById('modalEventName').value = '';
  document.getElementById('modalNote').value = '';
  document.getElementById('btnDeleteEvent').style.display = 'none';

  // jika sudah ada event, tampilkan yang pertama untuk diedit
  const evList = events[key] || [];
  if(evList.length > 0) {
    // buka event pertama
    openEventEdit(key, 0);
    return;
  }

  renderModalColors();
  document.getElementById('modalOverlay').style.display = 'flex';
  setTimeout(() => document.getElementById('modalEventName').focus(), 100);
}

function openEventEdit(key, idx) {
  modalDate = key;
  editingEventIdx = idx;
  const ev = events[key][idx];
  modalColor = ev.color || 'c-rose';

  const parts = key.split('-');
  const d = parseInt(parts[2]);
  const m = parseInt(parts[1]) - 1;
  const y = parseInt(parts[0]);
  document.getElementById('modalTitle').textContent = `${d} ${BULAN_ID[m]} ${y}`;
  document.getElementById('modalEventName').value = ev.name || '';
  document.getElementById('modalNote').value = ev.note || '';
  document.getElementById('btnDeleteEvent').style.display = 'block';

  renderModalColors();
  document.getElementById('modalOverlay').style.display = 'flex';
}

function renderModalColors() {
  const wrap = document.getElementById('modalColors');
  wrap.innerHTML = '';
  COLORS.forEach(c => {
    const dot = document.createElement('div');
    dot.className = 'modal-color-dot' + (c === modalColor ? ' selected' : '');
    dot.style.background = COLOR_HEX[c];
    dot.onclick = () => {
      modalColor = c;
      wrap.querySelectorAll('.modal-color-dot').forEach(x => x.classList.remove('selected'));
      dot.classList.add('selected');
    };
    wrap.appendChild(dot);
  });
}

function saveEvent() {
  const name = document.getElementById('modalEventName').value.trim();
  const note = document.getElementById('modalNote').value.trim();
  if(!name && !note) { closeModal(); return; }

  if(!events[modalDate]) events[modalDate] = [];
  const ev = { name, note, color: modalColor };

  if(editingEventIdx !== null) {
    events[modalDate][editingEventIdx] = ev;
  } else {
    events[modalDate].push(ev);
  }

  saveEvents(); closeModal(); renderCalendar();
}

function deleteEvent() {
  if(editingEventIdx !== null && events[modalDate]) {
    events[modalDate].splice(editingEventIdx, 1);
    if(events[modalDate].length === 0) delete events[modalDate];
    saveEvents();
  }
  closeModal(); renderCalendar();
}

function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }
function handleOverlayClick(e) { if(e.target === document.getElementById('modalOverlay')) closeModal(); }

renderNotes();
renderCalendar();
